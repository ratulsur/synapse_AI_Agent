astra_db:
  collection_name: "ecommercedata"

embedding_model:
  provider: "google"
  model_name: "models/text-embedding-004"

retriever:
  top_k: 4

# --- Agent / graph loop controls ---
agent:
  max_retrieval_iterations: 3    # retrieval-evidence loop cap
  max_revise_iterations: 2       # grounding-revise loop cap
  max_react_steps: 4             # ReAct reason-act-observe step cap (react_agent)
  default_audience: "general"
  default_length: "medium"
  default_tone: "neutral"

# --- Canonical routing domains (source of truth shared with domains/registry.py) ---
domains:
  - Techno
  - Education
  - Travel
  - Art
  - Mgmt
  - GENERIC

# --- In-process checkpointer (MemorySaver) ---
# Set persistence.db_path for SQLite when persistence/ is wired.
persistence:
  db_path: ":memory:"

llm:
  groq:
    provider: "groq"
    model_name: "llama-3.3-70b-versatile"
    temperature: 0
    max_output_tokens: 2048

  google:
    provider: "google"
    model_name: "gemini-2.0-flash"
    temperature: 0
    max_output_tokens: 2048

  openai:
     provider: "openai"
     model_name: "gpt-4o"
     temperature: 0
     max_output_tokens: 2048