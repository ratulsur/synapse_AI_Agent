astra_db:
  collection_name: "ecommercedata"

embedding_model:
  provider: "google"
  model_name: "models/text-embedding-004"

retriever:
  top_k: 4

# --- Agent / graph loop controls ---
agent:
  max_retrieval_iterations: 3    # retrieval-evidence loop cap
  max_revise_iterations: 2       # grounding-revise loop cap
  max_react_steps: 4             # ReAct reason-act-observe step cap (react_agent)
  default_audience: "general"
  default_length: "medium"
  default_tone: "neutral"

# --- Canonical routing domains (source of truth shared with domains/registry.py) ---
domains:
  - Techno
  - Education
  - Travel
  - Art
  - Mgmt
  - Finance
  - GENERIC

# --- Tool tunables (read by each tool via load_config()) ---
tools:
  web_search:
    top_k: 5          # max DuckDuckGo results per query
    timeout: 10       # HTTP timeout in seconds
  wiki:
    top_k: 3          # max Wikipedia / Wikivoyage pages per query
    timeout: 10
  arxiv:
    top_k: 5          # max arXiv papers per query
    timeout: 15
  finance:
    enabled: true
    default_period: "1mo"
    default_interval: "1d"
    max_tickers: 3
    timeout: 15
  external_api:
    enabled: false    # set true + provide credentials to activate
  mcp:
    enabled: false    # set true + configure servers to activate
    servers: []       # list of {name, url, transport} dicts

# --- Persistence (checkpointer + source store) ---
# Set db_path to a real file path (e.g. "data/synapse.db") to enable SQLite
# checkpointing and durable source storage.  ":memory:" uses in-process stores.
persistence:
  db_path: ":memory:"
  # source_db_path: "data/synapse_sources.db"  # optional override for the Source table

# --- API server settings ---
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "*"

llm:
  groq:
    provider: "groq"
    model_name: "llama-3.3-70b-versatile"
    temperature: 0
    max_output_tokens: 2048

  google:
    provider: "google"
    model_name: "gemini-2.0-flash"
    temperature: 0
    max_output_tokens: 2048

  openai:
     provider: "openai"
     model_name: "gpt-4o"
     temperature: 0
     max_output_tokens: 2048
