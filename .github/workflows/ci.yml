name: CI / CD

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Offline unit-test suite
  # This job MUST pass before the Docker build is allowed to run.
  # Live evals (evals/harness.py) are never triggered here — they require
  # RUN_LIVE_EVALS=1 and real provider API keys and must be run manually.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Cache uv's download cache keyed on pyproject.toml so dependency
      # downloads are reused across runs when the dependency set is unchanged.
      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install uv
        run: pip install --quiet uv

      - name: Install project with test extras
        # --system: install into the system Python (no separate venv needed in CI)
        # Editable install is required: utils/config_loader.py resolves the
        # project root via Path(__file__).parents[1], which must point to the
        # repo root, not to a site-packages directory.
        run: uv pip install --system -e '.[test]'

      - name: Run offline unit tests
        # RUN_LIVE_EVALS is explicitly unset to prevent accidental activation
        # of the live eval harness (evals/harness.py) if it were ever imported.
        env:
          RUN_LIVE_EVALS: ""
        run: python -m pytest tests/unit -q

  # ---------------------------------------------------------------------------
  # Job 2: Build Docker image and push to GitHub Container Registry (GHCR)
  # Gated on the test job — only runs when unit tests pass.
  #
  # Auth: uses the built-in GITHUB_TOKEN (no extra repository secrets needed).
  # Push: only on direct pushes to master (not on pull requests).
  # Tags: ghcr.io/<owner>/<repo>:latest  and  :<sha-FULL_SHA>
  # Cache: BuildKit layer cache stored in GitHub Actions cache (type=gha).
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build & Push (GHCR)
    runs-on: ubuntu-latest
    needs: test

    # packages:write is required to push to GHCR using GITHUB_TOKEN.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Compute a fully-lowercase image name from github.repository.
      # GHCR requires lowercase; repository names can contain uppercase letters.
      - name: Compute image name
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_OUTPUT"

      # Login is only needed when we are about to push (master push, not PRs).
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build (and push on master) using BuildKit with GHA layer caching.
      # On pull requests: build only — push is false, no credentials needed.
      # On master push:   build + push both :latest and :sha-<full-sha> tags.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          # GHA BuildKit cache: layers cached between runs, significantly
          # reducing build time when only source files changed (not deps).
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 3: Deploy static frontend to GitHub Pages
  # Gated on the test job. Only runs on direct pushes to master.
  # Enable GitHub Pages first: repo Settings → Pages → Source → GitHub Actions
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend (GitHub Pages)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload frontend as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
