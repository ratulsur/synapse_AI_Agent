# railway.toml — Railway v2 deployment configuration for synapse-ai-agent
# Docs: https://docs.railway.com/reference/config-as-code
#
# Railway builds from the Dockerfile in the repo root.
# Secrets must be set in the Railway dashboard (Variables tab) — never here.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
