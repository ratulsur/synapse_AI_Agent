# railway.toml — Railway v2 deployment configuration for synapse-ai-agent
# Docs: https://docs.railway.com/reference/config-as-code
#
# Railway builds from the Dockerfile in the repo root.
# Secrets must be set in the Railway dashboard (Variables tab) — never here.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run Alembic migrations on every deploy before starting the server.
# On SQLite (local/fallback) alembic upgrade is a no-op if tables exist.
# On Railway Postgres it applies any pending migrations safely.
startCommand = "alembic upgrade head && python -m api.app"
healthcheckPath = "/healthz"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
